databases:
  - name: belastingdinst-db
    plan: free
    databaseName: belastingdinst
    user: belastingdinst
    region: frankfurt

services:
  - type: web
    name: belastingdinst
    plan: free
    region: frankfurt
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: belastingdinst-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: WISE_PRIVATE_KEY
        sync: false
